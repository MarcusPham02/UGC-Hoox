[build]
  # Flutter web build output directory
  publish = "build/web"
  command = "flutter build web --release"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co https://*.supabase.in; img-src 'self' data:; frame-ancestors 'none';"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# SPA routing — send all paths to index.html so GoRouter handles them
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
